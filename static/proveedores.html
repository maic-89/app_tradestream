<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores - TradeStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <nav class="bg-blue-600 text-white shadow-md px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i data-lucide="briefcase" class="w-7 h-7"></i>
            <a href="/dashboard" class="text-xl font-bold tracking-wider hover:text-blue-200 transition">TradeStream</a>
            <span class="text-blue-300">/ Directorio de Proveedores</span>
        </div>
        <a href="/dashboard" class="bg-blue-700 hover:bg-blue-800 px-4 py-2 rounded-md text-sm font-medium transition flex items-center gap-1">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Volver al Panel
        </a>
    </nav>

    <main class="flex-1 p-6 max-w-7xl mx-auto w-full space-y-6">
        
        <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Maestro de Aliados Comerciales</h1>
                <p class="text-sm text-gray-500">Administra la información fiscal, canales de contacto y ubicación de fábricas o distribuidores internacionales.</p>
            </div>
            <div id="notificacion" class="hidden px-4 py-2 rounded-md text-sm font-medium shadow-sm transition"></div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 flex items-center space-x-4">
                <div class="p-3 bg-blue-100 text-blue-600 rounded-md"><i data-lucide="users"></i></div>
                <div><p class="text-xs text-gray-500 font-medium">Proveedores Registrados</p><h3 id="totalProveedores" class="text-xl font-bold text-gray-800">0</h3></div>
            </div>
            <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 flex items-center space-x-4">
                <div class="p-3 bg-green-100 text-green-600 rounded-md"><i data-lucide="globe"></i></div>
                <div><p class="text-xs text-gray-500 font-medium">Canales con Email Activo</p><h3 id="proveedoresEmail" class="text-xl font-bold text-green-700">0</h3></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 h-fit">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-1">
                    <i data-lucide="user-plus" class="text-blue-600"></i> Nuevo Proveedor
                </h2>
                
                <form id="proveedorForm" class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase">Nombre Comercial</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej. Asia Logistic Corp" required class="mt-1 block w-full bg-gray-50 border border-gray-300 rounded-md p-2 text-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 uppercase">NIT / Tax ID</label>
